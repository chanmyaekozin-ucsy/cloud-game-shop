services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - bot-data:/app/.data
      # Shared merchant KBZ session (READ-ONLY here).
      # Writer: Donimate Payment Manager only.
      # Set KBZ_SESSION_PATH=/data/kbz/kbz_session.json in env.
      - /data/kbz:/data/kbz
    shm_size: "1gb"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python bot/main.py' >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  bot-data:
